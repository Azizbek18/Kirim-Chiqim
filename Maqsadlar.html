<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maqsadlarim | OilaBalance</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style7.css">
</head>

<body>
  <div id="toast-container"></div>

  <div class="app-background">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
  </div>

  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="app-logo">
        <img src="./M_rasmlar/Logo (1).svg" alt="Logo">
      </div>

      <nav class="app-nav">
        <a href="bosh sahifa.html" class="nav-link">
          <i class="fa-solid fa-grid-2"></i> <span>Dashboard</span>
        </a>
        <a href="#" class="nav-link">
          <i class="fa-solid fa-wallet"></i> <span>Hamyon</span>
        </a>
        <a href="#" class="nav-link">
          <i class="fa-solid fa-chart-line"></i> <span>Tahlil</span>
        </a>
        <a href="#" class="nav-link active">
          <i class="fa-solid fa-bullseye"></i> <span>Maqsadlar</span>
        </a>
        <a href="#" class="nav-link ai-gold">
          <i class="fa-solid fa-wand-magic-sparkles"></i> <span>AI Maslahat</span>
        </a>
      </nav>

      <div class="app-sidebar-footer">
        <button class="nav-link"><i class="fa-solid fa-gear"></i> <span>Sozlamalar</span></button>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div class="calendar-nav">
          <h2>Maqsadlarim</h2>
        </div>

        <div style="display: flex; gap: 15px; align-items: center;">
          <button class="btn-primary" onclick="openGoalModal()">
            <i class="fa-solid fa-plus"></i> Yangi maqsad
          </button>
          <div class="user-avatar">AB</div>
        </div>
      </header>

      <div class="content-panel">
        <div class="panel-header" style="margin-bottom: 30px;">
          <h3>Jamg'armalar holati</h3>
        </div>

        <div id="goalsList"
          style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="goalModal">
    <div class="glass-modal">
      <div class="modal-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h3 style="font-weight: 800;">Yangi maqsad</h3>
        <button class="close-x" onclick="closeGoalModal()"
          style="border:none; background:none; cursor:pointer; font-size: 20px;">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Nomi</label>
          <input type="text" id="goalName" placeholder="Masalan: iPhone 16 Pro Max">
        </div>
        <div class="input-group">
          <label>Kerakli summa (sum)</label>
          <input type="number" id="goalPrice" placeholder="15000000">
        </div>
      </div>
      <div class="modal-footer" style="display: flex; gap: 12px; margin-top: 10px;">
        <button class="btn-secondary" onclick="closeGoalModal()" style="flex: 1;">Bekor qilish</button>
        <button class="btn-primary" onclick="createGoal()" style="flex: 1; justify-content: center;">Saqlash</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="moneyModal">
    <div class="glass-modal">
      <div class="modal-header"
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h3 style="font-weight: 800;">Pul qo'shish</h3>
        <button class="close-x" onclick="closeModal()"
          style="border:none; background:none; cursor:pointer; font-size: 20px;">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Qancha qo'shmoqchisiz?</label>
          <input type="number" id="moneyInput" placeholder="Masalan: 200000">
        </div>
      </div>
      <div class="modal-footer" style="display: flex; gap: 12px; margin-top: 10px;">
        <button class="btn-secondary" onclick="closeModal()" style="flex: 1;">Orqaga</button>
        <button class="btn-primary" onclick="addMoney()" style="flex: 1; justify-content: center;">Tasdiqlash</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="maqsadlar.js"></script>
</body>

</html>
