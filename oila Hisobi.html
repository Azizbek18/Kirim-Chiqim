<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="card">
        <h2>Oila hisobi ochish</h2>
        <p class="subtitle">Byudjetingizni boshqarishni boshlang</p>

        <label>Oila nomi</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon.svg" alt=""></span>
            <input id type="text" placeholder="Abdullayevlar oilasi">
        </div>

        <label>Sizning ismingiz</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon (1).svg" alt=""></span>
            <input type="text" placeholder="Ismingiz">
        </div>

        <label>Email</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon (2).svg" alt=""></span>
            <input type="email" placeholder="example@mail.com">
        </div>

        <label>Oylik daromad (so'm)</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon (3).svg" alt=""></span>
            <input type="text" placeholder="5 000 000">
        </div>

        <label>Parol</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon (4).svg" alt=""></span>
            <input type="password" placeholder="••••••••">
        </div>

        <label>Tasdiqlang</label>
        <div class="input-box">
            <span class="icon"><img src="/Icon (6).svg" alt=""></span>
            <input type="password" placeholder="••••••••">
        </div>

        <button class="btn">Hisob yaratish</button>

        <div class="footer">
            Hisobingiz bormi? <a href="#">Kiring</a>
        </div>
    </div>
    <script src="/oila hisobi.js"></script>
</body>

</html>
