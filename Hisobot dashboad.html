<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style5.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
<div class="burger" id="burger">☰</div>
<div class="overlay" id="overlay"></div>
        <div class="left-con">
            <div class="logo">
                <img src="./M_rasmlar/Logo (1).svg" alt="">
            </div>
            <ul class="ull">
    <button class="btn1"><i class="fa-regular fa-house"></i>Home</button>
                <button class="btn2"><i class="fa-solid fa-wallet"></i>Kirim/Chiqim</button>
                <button class="btn3"><i class="fa-solid fa-table-cells-large"></i>Kategoriyalar</button>
                <button class="btn4"><i class="fa-solid fa-bullseye"></i>Maqsadlar</button>
                <button class="btn5"><i class="fa-regular fa-credit-card"></i>Qarzlar</button>
                <button class="btn6"><i class="fa-regular fa-file-lines"></i>Hisobot</button>
                <button class="btn7"><i class="fa-solid fa-robot"></i>AI maslahat</button>
            
            </ul>
            
            <button class="btn8"><i class="fa-solid fa-gear"></i> Sozlamalar</button>
        </div>

    <div class="main">
        <div class="container">

            <div class="header">
                <h1>Hisobotlar</h1>
                <button onclick="downloadPDF()">PDF yuklash</button>
            </div>

            <div class="card stats">
                <div class="stat">
                    <h3>Jami kirim</h3>
                    <p class="green">+18,400,000</p>
                </div>
                <div class="stat">
                    <h3>Jami chiqim</h3>
                    <p class="red">-12,250,000</p>
                </div>
                <div class="stat">
                    <h3>Tejaldı</h3>
                    <p class="blue">6,150,000</p>
                </div>
            </div>

            <div class="card">
                <h3>6 oylik grafik</h3>
                <canvas id="lineChart"></canvas>
            </div>

            <div class="card">
                <h3>Kategoriya</h3>
                <canvas id="pieChart"></canvas>
            </div>

        </div>
    </div>

    <script src="/script.js"></script>
</body>

</html>
