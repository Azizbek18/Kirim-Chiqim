<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maqsadlar | OilaBalance</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style7.css"> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div id="toast-container"></div>

  <div class="app-background">
    <div class="liquid-blob blob-1"></div>
    <div class="liquid-blob blob-2"></div>
  </div>

  <div class="app-shell">
    <aside class="app-sidebar">
      <div class="app-logo">
        <img src="./M_rasmlar/Logo (1).svg" alt="Logo">
      </div>
      <nav class="app-nav">
        <button class="nav-link" onclick="location.href='bosh sahifa.html'"><i class="fa-solid fa-grid-2"></i> <span>Dashboard</span></button>
        <button class="nav-link"><i class="fa-solid fa-wallet"></i> <span>Hamyon</span></button>
        <button class="nav-link"><i class="fa-solid fa-chart-line"></i> <span>Tahlil</span></button>
        <button class="nav-link active"><i class="fa-solid fa-bullseye"></i> <span>Maqsadlar</span></button>
        <button class="nav-link ai-gold"><i class="fa-solid fa-wand-magic-sparkles"></i> <span>AI Maslahat</span></button>
      </nav>
      <div class="app-sidebar-footer">
        <button class="nav-link"><i class="fa-solid fa-gear"></i> <span>Sozlamalar</span></button>
      </div>
    </aside>

    <main class="app-main">
      <header class="app-header">
        <div class="calendar-nav">
          <h2>Maqsadlarim</h2>
        </div>
        <div class="header-tools">
          <div class="profile-group">
            <div class="user-avatar" id="avatar">AB</div>
            <span id="user-display-name" style="font-weight: 600; color: #1e293b;"></span>
          </div>
        </div>
      </header>

      <section class="main-grid" style="grid-template-columns: 1fr;">
        <div class="content-panel">
          <div class="panel-header">
            <h3>Faol maqsadlar</h3>
            <button class="btn-primary" onclick="openGoalModal()"><i class="fa-solid fa-plus"></i> Yangi maqsad</button>
          </div>
          
          <div class="goals-grid" id="goalsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
            </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="moneyModal">
    <div class="glass-modal">
      <div class="modal-header">
        <h3>Jamg'armaga pul qo'shish</h3>
        <button class="close-x" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Summani kiriting</label>
          <input type="number" id="moneyInput" placeholder="Masalan: 500000">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Bekor qilish</button>
        <button class="btn-primary" onclick="addMoney()">Saqlash</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="goalModal">
    <div class="glass-modal">
      <div class="modal-header">
        <h3>Yangi maqsad yaratish</h3>
        <button class="close-x" onclick="closeGoalModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>Maqsad nomi</label>
          <input type="text" id="goalName" placeholder="Masalan: iPhone 16 Pro">
        </div>
        <div class="input-group">
          <label>Kerakli summa</label>
          <input type="number" id="goalPrice" placeholder="Masalan: 15000000">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeGoalModal()">Bekor qilish</button>
        <button class="btn-primary" onclick="createGoal()">Yaratish</button>
      </div>
    </div>
  </div>

  <script src="maqsadlar.js"></script>
</body>
</html>
