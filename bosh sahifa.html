<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <title>OilaBalance Dashboard</title>
  <link rel="stylesheet" href="">
</head>

<body>

  <div class="container">

    <div class="sidebar">
      <h2>OilaBalance</h2>
      <ul>
        <li>Bosh sahifa</li>
        <li>Kirim / Chiqim</li>
        <li>Kategoriyalar</li>
        <li>Maqsadlar</li>
        <li>Hisobot</li>
      </ul>
    </div>


    <div class="main">

      <h2>Mart 2026</h2>
      <button onclick="downloadReport()">Hisobot yuklab olish</button>


      <div class="cards">
        <div class="card">
          <h3>Umumiy balans</h3>
          <p id="balance">0 so'm</p>
        </div>

        <div class="card">
          <h3>Kirim</h3>
          <p id="income" class="green">0</p>
        </div>

        <div class="card">
          <h3>Chiqim</h3>
          <p id="expense" class="red">0</p>
        </div>
      </div>

      <div class="transactions">
        <h3>So‘nggi harakatlar</h3>
        <div id="list"></div>
      </div>


      <div class="transactions">
        <h3>Kategoriyalar</h3>

        <p>Oziq-ovqat</p>
        <div class="progress">
          <div class="orange" style="width:42%"></div>
        </div>

        <p>Uy-joy</p>
        <div class="progress">
          <div class="purple" style="width:25%"></div>
        </div>

        <p>Transport</p>
        <div class="progress">
          <div class="blue" style="width:18%"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/bosh sahifa.js"></script>

</body>

</html>
