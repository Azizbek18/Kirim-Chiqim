<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qarzlar | OilaBalance</title>
    <link rel="stylesheet" href="style7.css"> <link rel="stylesheet" href="qarzlar.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="toast-container"></div>

    <div class="app-background">
        <div class="liquid-blob blob-1"></div>
        <div class="liquid-blob blob-2"></div>
    </div>

    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="app-logo">
                <img src="./M_rasmlar/Logo (1).svg" alt="Logo">
            </div>
            <nav class="app-nav">
                <a href="bosh sahifa.html" class="nav-link"><i class="fa-solid fa-house"></i> <span>Dashboard</span></a>
                <a href="#" class="nav-link"><i class="fa-solid fa-wallet"></i> <span>Kirim/Chiqim</span></a>
                <a href="./kategotiya.html" class="nav-link"><i class="fa-solid fa-table-cells-large"></i> <span>Kategoriyalar</span></a>
                <a href="./Maqsadlar.html" class="nav-link"><i class="fa-solid fa-bullseye"></i> <span>Maqsadlar</span></a>
                <a href="./qarzlar.html" class="nav-link active"><i class="fa-regular fa-credit-card"></i> <span>Qarzlar</span></a>
                <a href="./ai maslahatlar.html" class="nav-link ai-gold"><i class="fa-solid fa-wand-magic-sparkles"></i> <span>AI Maslahat</span></a>
            </nav>
            <div class="app-sidebar-footer">
                <button class="nav-link"><i class="fa-solid fa-gear"></i> <span>Sozlamalar</span></button>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div class="calendar-nav">
                    <h2>Qarzlar nazorati</h2>
                </div>
                <div class="header-tools" style="display: flex; gap: 15px; align-items: center;">
                    <div class="input-card glass-card" style="padding: 5px 15px; border-radius: 15px; display: flex; align-items: center;">
                        <i class="fa-solid fa-magnifying-glass search"></i>
                        <input class="input-3" type="text" placeholder=" Qidirish...">
                    </div>
                    <div class="user-avatar">AB</div>
                </div>
            </header>


            <div class="kirimlar">
                <div class="card glass-card">
                    <div class="text">
                        <p>Jami men bergan</p>
                        <h1 class="red" id="totalSent">0 so'm</h1>
                    </div>
                    <div class="img-card"><img src="./M_rasmlar/Overlay.svg" alt=""></div>
                </div>
                <div class="card glass-card">
                    <div class="text">
                        <p>Jami menga berilgan</p>
                        <h1 class="green" id="totalReceived">0 so'm</h1>
                    </div>
                    <div class="img-card"><img src="./M_rasmlar/Overlay (1).svg" alt=""></div>
                </div>
            </div>

            <div class="chiqim-kirim glass-card">
                <div class="royxat">
                    <h1>Qarzlar ro'yxati</h1>
                    <p><i class="fa-solid fa-filter"></i> Saralash</p>
                </div>
                <hr>
                <div id="debtsListContainer">
                    </div>
            </div>

            <div class="foter">
                <button class="btn-primary" onclick="openDebtModal()" style="padding: 15px 40px; border-radius: 30px;">
                    <i class="fa-solid fa-plus"></i> Yangi qarz qo'shish
                </button>
                <p class="qaytarilish">Qaytarilish kutilmoqda: <span id="pendingAmount">0</span> so'm</p>
            </div>
        </main>
    </div>

    <div id="debtModal" class="modal-overlay">
        <div class="glass-modal">
            <div class="modal-header" style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-weight: 800;">Yangi qarz</h3>
                <span class="close-x" onclick="closeDebtModal()" style="cursor:pointer; font-size: 24px;">&times;</span>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Ism</label>
                    <input type="text" id="ism" placeholder="Kimga / Kimdan?">
                </div>
                <div class="input-group">
                    <label>Summa</label>
                    <input type="number" id="summa" placeholder="500000">
                </div>
                <div class="input-group">
                    <label>Sana</label>
                    <input type="date" id="sana">
                </div>
                <div class="input-group">
                    <label>Sabab</label>
                    <input type="text" id="sabab" placeholder="Nima uchun?">
                </div>
                <div class="input-group">
                    <label>Holat</label>
                    <select id="holat" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;">
                        <option value="Kutilmoqda">Kutilmoqda</option>
                        <option value="Qaytarildi">Qaytarildi</option>
                    </select>
                </div>
                <button class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="Jonatish()">Saqlash</button>
            </div>
        </div>
    </div>

    <script src="qarzlar.js"></script>
</body>
</html>
